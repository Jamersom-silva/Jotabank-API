spring:
  datasource:
    url: jdbc:h2:mem:jotabank;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

logging:
  level:
    org.hibernate.SQL: debug
app:
  security:
    jwt:
      secret: "DEV-CHANGE-ME-TO-A-VERY-LONG-SECRET-AT-LEAST-32-CHARS"
      issuer: "jotabank"
      expirationMinutes: 60
